# libsolcompat CI
#
# Builds the library cross-compiled for SPARC Solaris 7 and creates a
# versioned GitHub Release on tag push.
#
# cross-compile and qemu-test both run on sparc-qemu (.244 only) until the
# self-contained ghcr.io/firefly128/sparc-toolchain image is published.
# After that, cross-compile can move back to sparc-build (both .244 and .212).
#
# Cross-compiler location inside the container:
#   /opt/cross/bin/sparc-sun-solaris2.7-{gcc,ar,ranlib,...}
# Solaris 7 sysroot inside the container:
#   /opt/sysroot-build

name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  # ------------------------------------------------------------------ #
  # cross-compile: build libsolcompat.a targeting SPARC Solaris 7       #
  # ------------------------------------------------------------------ #
  cross-compile:
    name: Cross-compile for SPARC Solaris 7
    runs-on: [self-hosted, sparc-qemu]

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Build static library
        run: |
          docker run --rm --pull=missing \
            -v "${{ github.workspace }}:/work" \
            -v sparc-build-host_cross-build-cross:/opt/cross:ro \
            -v "$SPARC_BUILD_HOST/cross-build/sysroot:/opt/sysroot-build:ro" \
            -e PATH=/opt/cross/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin \
            -w /work \
            ghcr.io/firefly128/sparc-toolchain:latest \
            make \
              CC=sparc-sun-solaris2.7-gcc \
              AR=sparc-sun-solaris2.7-ar \
              RANLIB=sparc-sun-solaris2.7-ranlib \
              CFLAGS="-O2 --sysroot=/opt/sysroot-build -mcpu=v7 -D__EXTENSIONS__ -Wall -Wextra -Wno-unused-parameter"

      - name: Verify library symbol table
        run: |
          docker run --rm --pull=missing \
            -v "${{ github.workspace }}:/work" \
            -v sparc-build-host_cross-build-cross:/opt/cross:ro \
            -e PATH=/opt/cross/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin \
            -w /work \
            ghcr.io/firefly128/sparc-toolchain:latest \
            sh -c 'sparc-sun-solaris2.7-nm libsolcompat.a | grep -c " T " \
              | xargs -I{} echo "Exported {} text symbols"'

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libsolcompat-sparc-solaris7-${{ github.sha }}
          path: |
            libsolcompat.a
            include/

  # ------------------------------------------------------------------ #
  # qemu-test: run test_all natively on Solaris 7 in QEMU              #
  #                                                                     #
  # Requires sparc-qemu runner (.244 only — only machine with disk      #
  # images and QEMU ROM). Boots the installed Solaris VM, SCPs the     #
  # test binary using the container's auto-generated SSH key, runs it, #
  # then shuts QEMU down.  Boot takes ~10 minutes.                     #
  # ------------------------------------------------------------------ #
  qemu-test:
    name: Integration test on SPARC Solaris 7
    needs: cross-compile
    runs-on: [self-hosted, sparc-qemu]
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: libsolcompat-sparc-solaris7-${{ github.sha }}
          path: artifacts/

      - name: Cross-compile test binary for SPARC
        run: |
          docker run --rm --pull=missing \
            -v "${{ github.workspace }}:/work" \
            -v sparc-build-host_cross-build-cross:/opt/cross:ro \
            -v "$SPARC_BUILD_HOST/cross-build/sysroot:/opt/sysroot-build:ro" \
            -e PATH=/opt/cross/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin \
            -w /work \
            ghcr.io/firefly128/sparc-toolchain:latest \
            sparc-sun-solaris2.7-gcc \
              --sysroot=/opt/sysroot-build \
              -mcpu=v7 -D__EXTENSIONS__ \
              -Iinclude -Iinclude/override \
              -o test_all_sparc \
              tests/test_all.c \
              artifacts/libsolcompat.a \
              -lrt -lsocket -lnsl -lm

      - name: Start Solaris VM
        working-directory: ${{ env.SPARC_BUILD_HOST }}
        run: docker compose --profile runtime up -d

      - name: Wait for SSH ready
        # runtime-boot.expect installs the container's generated key into
        # Solaris at /.ssh/authorized_keys and restarts sshd.  We extract
        # the container's private key and poll until Solaris accepts it.
        # Port 2222 on the host forwards to Solaris port 22 via SLIRP.
        run: |
          echo "Waiting for container SSH key to be generated..."
          until docker exec solaris-runtime test -f /root/.ssh/id_ed25519 2>/dev/null; do
            sleep 5
          done
          docker exec solaris-runtime cat /root/.ssh/id_ed25519 > /tmp/solaris-ci-key
          chmod 600 /tmp/solaris-ci-key

          echo "Polling SSH (up to 25 min for boot + SSH setup)..."
          for attempt in $(seq 1 150); do
            if ssh -i /tmp/solaris-ci-key \
                   -p 2222 \
                   -o StrictHostKeyChecking=no \
                   -o ConnectTimeout=5 \
                   -o BatchMode=yes \
                   root@localhost true 2>/dev/null; then
              echo "SSH ready after $((attempt * 10)) seconds"
              exit 0
            fi
            sleep 10
          done
          echo "Timeout: SSH not ready after 25 minutes" && exit 1

      - name: Copy test binary to Solaris
        run: |
          scp -P 2222 \
            -i /tmp/solaris-ci-key \
            -o StrictHostKeyChecking=no \
            test_all_sparc root@localhost:/export/home/test_all_sparc

      - name: Run tests on Solaris 7
        run: |
          ssh -p 2222 \
            -i /tmp/solaris-ci-key \
            -o StrictHostKeyChecking=no \
            root@localhost \
            "chmod +x /export/home/test_all_sparc && /export/home/test_all_sparc"

      - name: Stop Solaris VM
        if: always()
        working-directory: ${{ env.SPARC_BUILD_HOST }}
        run: |
          docker compose --profile runtime down
          rm -f /tmp/solaris-ci-key

  # ------------------------------------------------------------------ #
  # release: create GitHub Release on tag push (vX.Y.Z)                #
  # ------------------------------------------------------------------ #
  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: cross-compile
    runs-on: [self-hosted, sparc-qemu]
    permissions:
      contents: write

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: libsolcompat-sparc-solaris7-${{ github.sha }}
          path: release-staging/

      - name: Package release tarball
        run: |
          RELEASE_VERSION=${GITHUB_REF_NAME#v}
          cp README.md LICENSE release-staging/
          tar czf "libsolcompat-${RELEASE_VERSION}-sparc-solaris7.tar.gz" \
            -C release-staging .
          echo "RELEASE_VERSION=${RELEASE_VERSION}" >> "$GITHUB_ENV"

      - name: Create GitHub release and upload tarball
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "libsolcompat ${RELEASE_VERSION}" \
            --notes "POSIX/C99/C11 compatibility library for Solaris 7 SPARC. See README.md for installation and usage." \
            "libsolcompat-${RELEASE_VERSION}-sparc-solaris7.tar.gz"
