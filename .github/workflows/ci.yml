# libsolcompat CI
#
# Builds the library cross-compiled for SPARC Solaris 7 and creates a
# versioned GitHub Release on tag push.
#
# cross-compile and qemu-test both run on sparc-qemu (.244 only) until the
# self-contained ghcr.io/sunstorm-project/sparc-toolchain image is published.
# After that, cross-compile can move back to sparc-build (both .244 and .212).
#
# Cross-compiler location inside the container:
#   /opt/cross/bin/sparc-sun-solaris2.7-{gcc,ar,ranlib,...}
# Solaris 7 sysroot inside the container:
#   /opt/sysroot-build

name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  # ------------------------------------------------------------------ #
  # cross-compile: build libsolcompat.a targeting SPARC Solaris 7       #
  # ------------------------------------------------------------------ #
  cross-compile:
    name: Cross-compile for SPARC Solaris 7
    runs-on: [self-hosted, sparc-qemu]
    env:
      SPARC_BUILD_HOST: ${{ vars.SPARC_BUILD_HOST || '/opt/sparc/sparc-build-host' }}
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Build static library
        run: |
          docker run --rm --pull=missing \
            -v "${{ github.workspace }}:/work" \
            -v sparc-build-host_cross-build-cross:/opt/cross:ro \
            -v "$SPARC_BUILD_HOST/sysroot:/opt/sysroot-build:ro" \
            -e PATH=/opt/cross/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin \
            -w /work \
            ghcr.io/sunstorm-project/sparc-toolchain:latest \
            make \
              CC=sparc-sun-solaris2.7-gcc \
              AR=sparc-sun-solaris2.7-ar \
              RANLIB=sparc-sun-solaris2.7-ranlib \
              CFLAGS="-O2 --sysroot=/opt/sysroot-build -mcpu=v7 -D__EXTENSIONS__ -Wall -Wextra -Wno-unused-parameter"

      - name: Verify library symbol table
        run: |
          docker run --rm --pull=missing \
            -v "${{ github.workspace }}:/work" \
            -v sparc-build-host_cross-build-cross:/opt/cross:ro \
            -e PATH=/opt/cross/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin \
            -w /work \
            ghcr.io/sunstorm-project/sparc-toolchain:latest \
            sh -c 'sparc-sun-solaris2.7-nm libsolcompat.a | grep -c " T " \
              | xargs -I{} echo "Exported {} text symbols"'

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libsolcompat-sparc-solaris7-${{ github.sha }}
          path: |
            libsolcompat.a
            include/

  # ------------------------------------------------------------------ #
  # qemu-test: run test_all natively on Solaris 7 in QEMU              #
  #                                                                     #
  # Requires sparc-qemu runner (.244 only — only machine with disk      #
  # images and QEMU ROM). Boots the installed Solaris VM, transfers    #
  # the test binary via uuencode over the QEMU serial console, runs   #
  # it, then shuts QEMU down.  Boot takes ~10 minutes.                 #
  # ------------------------------------------------------------------ #
  qemu-test:
    name: Integration test on SPARC Solaris 7
    needs: cross-compile
    runs-on: [self-hosted, sparc-qemu]
    timeout-minutes: 35
    env:
      SPARC_BUILD_HOST: ${{ vars.SPARC_BUILD_HOST || '/opt/sparc/sparc-build-host' }}

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Check out sparc-build-host (for QEMU scripts)
        uses: actions/checkout@v4
        with:
          repository: Sunstorm-Project/sparc-build-host
          path: sparc-build-host/

      - name: Sync QEMU test scripts to install path
        run: |
          sudo rm -rf "$SPARC_BUILD_HOST/tests/"
          sudo cp -a sparc-build-host/tests "$SPARC_BUILD_HOST/tests"
          sudo chown -R "$(id -u):$(id -g)" "$SPARC_BUILD_HOST/tests/"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: libsolcompat-sparc-solaris7-${{ github.sha }}
          path: artifacts/

      - name: Cross-compile test binary for SPARC
        run: |
          docker run --rm --pull=missing \
            -v "${{ github.workspace }}:/work" \
            -v sparc-build-host_cross-build-cross:/opt/cross:ro \
            -v "$SPARC_BUILD_HOST/sysroot:/opt/sysroot-build:ro" \
            -e PATH=/opt/cross/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin \
            -w /work \
            ghcr.io/sunstorm-project/sparc-toolchain:latest \
            sparc-sun-solaris2.7-gcc \
              --sysroot=/opt/sysroot-build \
              -mcpu=v7 -D__EXTENSIONS__ \
              -Iinclude -Iinclude/override \
              -o test_all_sparc \
              tests/test_all.c \
              artifacts/libsolcompat.a \
              -lrt -lsocket -lnsl -lresolv -ldl -lm

      - name: Start Solaris VM
        run: cd "$SPARC_BUILD_HOST" && docker compose --profile runtime up -d

      - name: Wait for Solaris SSH ready
        # start-solaris-vm.sh emits "SSH CONFIGURED" once sshd is up and
        # the serial console is at a login prompt. Wait up to 20 minutes.
        run: |
          echo "Waiting for Solaris boot (up to 20 min)..."
          for attempt in $(seq 1 120); do
            if docker logs solaris-runtime 2>&1 | grep -q "SSH CONFIGURED"; then
              echo "Boot complete after $((attempt * 10)) seconds"
              sleep 5
              exit 0
            fi
            sleep 10
          done
          echo "Timeout: Solaris did not reach SSH CONFIGURED in 20 minutes"
          exit 1

      - name: Copy test binary into container
        # The ci-run-test.expect script transfers it from /tmp into Solaris
        # via uuencode over the QEMU serial console.
        run: docker cp test_all_sparc solaris-runtime:/tmp/test_all_sparc

      - name: Transfer and run tests on Solaris 7
        # ci-run-test.expect is mounted at /tests/ inside the container
        # (via ./tests:/tests:ro in docker-compose.yml).
        # It uuencodes /tmp/test_all_sparc and sends it to Solaris via
        # the QEMU serial console, then runs it and returns its exit code.
        run: |
          docker exec solaris-runtime \
            expect /tests/ci-run-test.expect \
              /tmp/test_all_sparc \
              /export/home/test_all_sparc

      - name: Stop Solaris VM
        if: always()
        run: cd "$SPARC_BUILD_HOST" && docker compose --profile runtime down

  # ------------------------------------------------------------------ #
  # release: create GitHub Release on tag push (vX.Y.Z)                #
  # ------------------------------------------------------------------ #
  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: cross-compile
    runs-on: [self-hosted, sparc-qemu]
    permissions:
      contents: write

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: libsolcompat-sparc-solaris7-${{ github.sha }}
          path: release-staging/

      - name: Package release tarball
        run: |
          RELEASE_VERSION=${GITHUB_REF_NAME#v}
          cp README.md LICENSE release-staging/
          tar czf "libsolcompat-${RELEASE_VERSION}-sparc-solaris7.tar.gz" \
            -C release-staging .
          echo "RELEASE_VERSION=${RELEASE_VERSION}" >> "$GITHUB_ENV"

      - name: Create GitHub release and upload tarball
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "libsolcompat ${RELEASE_VERSION}" \
            --notes "POSIX/C99/C11 compatibility library for Solaris 7 SPARC. See README.md for installation and usage." \
            "libsolcompat-${RELEASE_VERSION}-sparc-solaris7.tar.gz"
